<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Glassy To-Do</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg1:#0f2027; --bg2:#203a43; --bg3:#2c5364;
    --glass:rgba(255,255,255,0.08);
    --border:rgba(255,255,255,0.15);
    --text:#eaf6ff; --muted:#b8c6d1;
    --accent1:#00f5ff; --accent2:#ff00e0;
    --ok:#51d17a; --warn:#ffcc00; --danger:#ff5b5b;
    --shadow:0 12px 40px rgba(0,0,0,0.35);
  }
  [data-theme="light"]{
    --bg1:#f7f8fc; --bg2:#eef1f8; --bg3:#e6ecf7;
    --glass:rgba(255,255,255,0.6);
    --border:rgba(0,0,0,0.06);
    --text:#1c2a36; --muted:#4c5b68;
    --shadow:0 12px 40px rgba(0,0,0,0.12);
  }
  *{box-sizing:border-box}
  body{
    margin:0; min-height:100vh;
    font-family:"Poppins",system-ui,-apple-system,Segoe UI,Roboto,Arial;
    color:var(--text);
    background: radial-gradient(1100px 700px at -10% -20%, var(--bg1), transparent 60%),
                radial-gradient(900px 900px at 120% -10%, var(--bg2), transparent 60%),
                radial-gradient(1000px 700px at 50% 120%, var(--bg3), transparent 60%),
                linear-gradient(135deg,var(--bg1),var(--bg3));
    display:flex; align-items:center; justify-content:center;
    padding:32px;
  }
  .app{
    width:min(100%, 980px);
    background:var(--glass);
    border:1px solid var(--border);
    border-radius:24px;
    backdrop-filter: blur(18px);
    box-shadow:var(--shadow);
    overflow:hidden;
  }
  .header{
    padding:22px 22px 12px;
    display:flex; align-items:center; gap:14px; justify-content:space-between; flex-wrap:wrap;
  }
  .brand{
    font-weight:700; letter-spacing:0.5px; font-size:1.25rem;
    background:linear-gradient(90deg,var(--accent1),var(--accent2));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    text-transform:uppercase;
  }
  .theme-toggle{
    border:1px solid var(--border); background:transparent; color:var(--text);
    padding:8px 12px; border-radius:12px; cursor:pointer;
    transition:transform .15s ease, box-shadow .3s ease;
  }
  .theme-toggle:hover{ transform:translateY(-2px); box-shadow:0 8px 22px rgba(0,0,0,.18)}
  .neon-bar{
    height:3px; margin:0 16px;
    background:linear-gradient(90deg,var(--accent1),var(--accent2));
    box-shadow:0 0 12px var(--accent1), 0 0 20px var(--accent2);
    border-radius:999px;
  }
  .controls{
    padding:18px 22px 8px; display:grid; gap:12px;
    grid-template-columns: 1fr minmax(120px,160px) minmax(130px,160px) auto;
  }
  .input, .select, .btn{
    width:100%; border:1px solid var(--border); background:rgba(255,255,255,0.05);
    color:var(--text); border-radius:12px; padding:12px 14px; outline:none;
    backdrop-filter: blur(10px);
  }
  .input::placeholder{ color:var(--muted) }
  .btn{
    cursor:pointer; font-weight:600;
    background-image:linear-gradient(90deg,var(--accent1),var(--accent2));
    color:#001018; border:none;
    box-shadow:0 8px 24px rgba(255,0,224,0.25), 0 8px 24px rgba(0,245,255,0.2);
    transition: transform .15s ease;
  }
  .btn:active{ transform:translateY(1px) }
  .toolbar{
    padding:8px 22px 18px; display:flex; flex-wrap:wrap; gap:10px; align-items:center; justify-content:space-between;
  }
  .filters, .bulk{ display:flex; gap:8px; flex-wrap:wrap; }
  .chip{
    border:1px solid var(--border); background:transparent; color:var(--text);
    padding:8px 12px; border-radius:999px; cursor:pointer;
  }
  .chip.active, .chip:hover{
    background:linear-gradient(90deg,var(--accent1),var(--accent2));
    color:#001018;
  }
  .search{
    display:flex; align-items:center; gap:8px;
    border:1px solid var(--border); border-radius:12px; padding:10px 12px; background:rgba(255,255,255,0.04);
    min-width:240px; flex:1;
  }
  .search input{
    border:none; background:transparent; color:var(--text); width:100%; outline:none;
  }
  .list{
    padding:8px 10px 22px; max-height:60vh; overflow:auto;
  }
  .empty{
    opacity:.7; text-align:center; padding:28px;
  }
  /* Task card */
  .task{
    display:grid; grid-template-columns:auto 1fr minmax(120px,160px) minmax(82px,96px) auto;
    gap:10px; align-items:center; padding:12px; margin:10px;
    background:rgba(255,255,255,0.06); border:1px solid var(--border); border-radius:14px;
    backdrop-filter: blur(10px);
    transition: box-shadow .2s ease, transform .1s ease, background .2s ease;
  }
  .task:hover{
    box-shadow:0 0 18px rgba(0,245,255,0.25), 0 0 18px rgba(255,0,224,0.2);
    background:rgba(255,255,255,0.08);
  }
  .drag-handle{ cursor:grab; user-select:none; opacity:.8; padding:0 6px; }
  .title{ display:flex; align-items:center; gap:10px; }
  .title input[type="text"]{
    border:none; background:transparent; color:var(--text); width:100%; outline:none;
    padding:6px 8px; border-radius:8px;
  }
  .title input[type="text"]:focus{
    background:rgba(255,255,255,0.06);
  }
  .check{ accent-color: var(--ok); width:18px; height:18px; }
  .meta{ font-size:12px; color:var(--muted); display:flex; gap:8px; align-items:center; }
  .badge{
    padding:4px 8px; border-radius:999px; font-size:12px; font-weight:600;
    border:1px solid var(--border);
  }
  .pri-low{ background:rgba(81,209,122,0.15); color:#aaf2c9; }
  .pri-med{ background:rgba(255,204,0,0.15); color:#ffe48a; }
  .pri-high{ background:rgba(255,91,91,0.18); color:#ffb1b1; }
  .actions{ display:flex; gap:8px; justify-content:flex-end; }
  .icon-btn{
    border:1px solid var(--border); background:transparent; color:var(--text);
    padding:8px 10px; border-radius:10px; cursor:pointer;
    transition:transform .1s ease;
  }
  .icon-btn:hover{ transform:translateY(-1px) }
  .task.completed{
    opacity:.7;
    background:rgba(81,209,122,0.12);
  }
  .task.completed .title input{ text-decoration: line-through; }
  .api-panel{
    margin: 16px 22px 0;
    padding: 14px 16px;
    display:flex; justify-content:space-between; align-items:center; gap:12px;
    flex-wrap:wrap;
    border:1px solid var(--border);
    border-radius:16px;
    background:rgba(255,255,255,0.05);
  }
  .api-label{
    display:inline-block; font-size:11px; letter-spacing:0.22em; text-transform:uppercase;
    color:var(--accent1); margin-bottom:4px;
  }
  .api-panel .btn.secondary{
    background:transparent; color:var(--text); border:1px solid var(--border); box-shadow:none;
  }
  .footer{
    padding:16px 22px; display:grid; gap:10px;
    grid-template-columns: 1fr auto;
    align-items:center; border-top:1px solid var(--border);
    background:rgba(255,255,255,0.04);
  }
  .progress{
    height:10px; background:rgba(255,255,255,0.1); border-radius:999px; overflow:hidden;
  }
  .progress > div{
    height:100%; width:0%;
    background:linear-gradient(90deg,var(--accent1),var(--accent2));
    box-shadow:0 0 12px var(--accent1),0 0 16px var(--accent2);
    transition:width .3s ease;
  }
  .small{ font-size:12px; color:var(--muted); }
  .hidden{ display:none !important; }

  /* Neon hover underline for controls */
  .chip, .btn, .theme-toggle, .icon-btn{
    position:relative; overflow:hidden;
  }
  .chip::after, .btn::after, .theme-toggle::after, .icon-btn::after{
    content:""; position:absolute; left:-40%; top:0; width:40%; height:100%;
    background:linear-gradient(90deg, transparent, rgba(255,255,255,.35), transparent);
    transform:skewX(-20deg); filter:blur(2px);
    transition:left .6s ease;
  }
  .chip:hover::after, .btn:hover::after, .theme-toggle:hover::after, .icon-btn:hover::after{ left:140%; }

  @media (max-width:820px){
    .controls{ grid-template-columns:1fr 1fr 1fr; }
    .controls .select.priority{ order:3 }
    .controls .btn{ grid-column:span 3; }
    .task{ grid-template-columns:auto 1fr auto; grid-template-rows:auto auto; }
    .task .meta{ grid-column:2 / 3; }
    .task .actions{ grid-column:3 / 4; }
  }
</style>
</head>
<body>
  <div class="app" id="app">
    <div class="header">
      <div class="brand">Glassy To-Do</div>
      <button class="theme-toggle" id="themeBtn" title="Toggle Light/Dark">🌗 Theme</button>
    </div>
    <div class="neon-bar"></div>

    <!-- Create Task -->
    <div class="controls">
      <input id="taskInput" class="input" type="text" placeholder="What needs to be done? (Press Enter to add)"/>
      <input id="dueInput" class="input" type="date" />
      <select id="priorityInput" class="select priority">
        <option value="low">Priority: Low</option>
        <option value="med">Priority: Medium</option>
        <option value="high">Priority: High</option>
      </select>
      <button id="addBtn" class="btn">+ Add Task</button>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="filters">
        <button class="chip active" data-filter="all">All</button>
        <button class="chip" data-filter="active">Active</button>
        <button class="chip" data-filter="completed">Completed</button>
        <button class="chip" id="clearCompleted">Clear Completed</button>
      </div>
      <div class="search">
        🔎
        <input id="searchInput" type="text" placeholder="Search tasks...">
      </div>
      <div class="bulk">
        <button class="chip" id="exportBtn" title="Export JSON">Export</button>
        <label class="chip" for="importFile" title="Import JSON" style="cursor:pointer;">Import</label>
        <input id="importFile" class="hidden" type="file" accept="application/json">
      </div>
    </div>

    <div class="api-panel">
      <div>
        <div class="api-label">Live API</div>
        <div id="apiQuote">Loading fresh inspiration…</div>
        <div id="apiAuthor" class="small"></div>
      </div>
      <button id="refreshQuote" class="btn secondary">✨ New quote</button>
    </div>

    <!-- List -->
    <div class="list" id="list">
      <div class="empty" id="empty">No tasks yet. Add your first task! ✨</div>
    </div>

    <!-- Footer / Progress -->
    <div class="footer">
      <div class="small" id="counter">0 total • 0 completed • 0 active</div>
      <div class="progress" aria-label="progress">
        <div id="progressBar"></div>
      </div>
    </div>
  </div>

<script>
(() => {
  const $ = (sel, root=document) => root.querySelector(sel);
  const $$ = (sel, root=document) => [...root.querySelectorAll(sel)];

  const state = {
    tasks: [],
    filter: 'all',
    search: ''
  };

  // LocalStorage
  const STORAGE_KEY = 'alfido_todo_v1';
  const THEME_KEY = 'alfido_theme';
  const save = () => localStorage.setItem(STORAGE_KEY, JSON.stringify(state.tasks));
  const load = () => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      state.tasks = raw ? JSON.parse(raw) : [];
    } catch { state.tasks = []; }
  };

  // Theme
  const savedTheme = localStorage.getItem(THEME_KEY);
  if(savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);
  $('#themeBtn').addEventListener('click', () => {
    const cur = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', cur);
    localStorage.setItem(THEME_KEY, cur);
  });

  // Elements
  const listEl = $('#list');
  const emptyEl = $('#empty');
  const taskInput = $('#taskInput');
  const dueInput = $('#dueInput');
  const priorityInput = $('#priorityInput');
  const addBtn = $('#addBtn');
  const progressBar = $('#progressBar');
  const counterEl = $('#counter');
  const searchInput = $('#searchInput');
  const apiQuoteEl = $('#apiQuote');
  const apiAuthorEl = $('#apiAuthor');
  const refreshQuoteBtn = $('#refreshQuote');

  // Utils
  const uid = () => Math.random().toString(36).slice(2) + Date.now().toString(36);
  const formatDate = (iso) => {
    if(!iso) return 'No due';
    const d = new Date(iso + 'T00:00:00');
    if(Number.isNaN(d.getTime())) return 'No due';
    return d.toLocaleDateString(undefined, { day:'2-digit', month:'short', year:'numeric' });
  };

  // Create Task
  function addTask(){
    const text = taskInput.value.trim();
    if(!text) return;
    const task = {
      id: uid(),
      text,
      completed: false,
      due: dueInput.value || '',
      priority: priorityInput.value, // low | med | high
      createdAt: Date.now(),
      order: state.tasks.length ? Math.max(...state.tasks.map(t=>t.order||0))+1 : 1
    };
    state.tasks.push(task);
    taskInput.value=''; dueInput.value='';
    render(); save();
  }

  // Build Task DOM
  function buildTask(task){
    const row = document.createElement('div');
    row.className = 'task' + (task.completed ? ' completed' : '');
    row.setAttribute('draggable','true');
    row.dataset.id = task.id;

    // Drag handle
    const drag = document.createElement('div');
    drag.className='drag-handle'; drag.title='Drag to reorder';
    drag.textContent='⋮⋮';

    // Checkbox + title (editable)
    const titleWrap = document.createElement('div'); titleWrap.className='title';
    const check = document.createElement('input'); check.type='checkbox'; check.className='check';
    check.checked = task.completed;
    const input = document.createElement('input'); input.type='text'; input.value=task.text;
    input.title='Click to edit';
    titleWrap.append(check, input);

    // Meta (due + priority)
    const meta = document.createElement('div'); meta.className='meta';
    const due = document.createElement('span'); due.textContent = formatDate(task.due);
    const pri = document.createElement('span'); pri.className='badge ' + (task.priority==='high'?'pri-high':task.priority==='med'?'pri-med':'pri-low');
    pri.textContent = task.priority.toUpperCase();
    meta.append(due, pri);

    // Actions
    const actions = document.createElement('div'); actions.className='actions';
    const del = document.createElement('button'); del.className='icon-btn'; del.title='Delete'; del.textContent='🗑️';
    const togglePri = document.createElement('button'); togglePri.className='icon-btn'; togglePri.title='Cycle Priority'; togglePri.textContent='⭐';

    actions.append(togglePri, del);

    // Layout
    row.append(drag, titleWrap, meta, /* spacer on wide */ document.createElement('div'), actions);

    // Events
    check.addEventListener('change', () => { task.completed = check.checked; render(); save(); });
    input.addEventListener('change', () => { task.text = input.value.trim() || task.text; render(); save(); });
    input.addEventListener('keydown', (e)=>{ if(e.key==='Enter'){ input.blur(); }});
    del.addEventListener('click', () => { state.tasks = state.tasks.filter(t=>t.id!==task.id); render(); save(); });
    togglePri.addEventListener('click', () => {
      task.priority = task.priority==='low'?'med':task.priority==='med'?'high':'low';
      render(); save();
    });

    // Drag & Drop
    row.addEventListener('dragstart', (e) => {
      e.dataTransfer.setData('text/plain', task.id);
      e.dataTransfer.effectAllowed='move';
      row.style.opacity='0.6';
    });
    row.addEventListener('dragend', () => { row.style.opacity=''; });
    row.addEventListener('dragover', (e) => { e.preventDefault(); e.dataTransfer.dropEffect='move'; });
    row.addEventListener('drop', (e) => {
      e.preventDefault();
      const fromId = e.dataTransfer.getData('text/plain');
      if(!fromId || fromId===task.id) return;
      reorder(fromId, task.id);
    });

    return row;
  }

  function reorder(fromId, toId){
    const arr = state.tasks.slice().sort((a,b)=>(a.order||0)-(b.order||0));
    const fromIdx = arr.findIndex(t=>t.id===fromId);
    const toIdx   = arr.findIndex(t=>t.id===toId);
    if(fromIdx<0 || toIdx<0) return;
    const [moved] = arr.splice(fromIdx,1);
    arr.splice(toIdx,0,moved);
    // reassign order
    arr.forEach((t,i)=>t.order=i+1);
    // map back to state order
    state.tasks = arr;
    render(); save();
  }

  // Render
  function render(){
    // Filter + search
    const term = state.search.toLowerCase();
    const list = state.tasks
      .filter(t => state.filter==='all' ? true : state.filter==='active' ? !t.completed : t.completed)
      .filter(t => !term || t.text.toLowerCase().includes(term))
      .sort((a,b)=>(a.order||0)-(b.order||0));

    listEl.innerHTML='';
    if(list.length===0){
      emptyEl.classList.remove('hidden');
      listEl.append(emptyEl);
    } else {
      emptyEl.classList.add('hidden');
      list.forEach(t => listEl.append(buildTask(t)));
    }

    // Counters & progress
    const total = state.tasks.length;
    const done  = state.tasks.filter(t=>t.completed).length;
    const active = total - done;
    counterEl.textContent = `${total} total • ${done} completed • ${active} active`;
    progressBar.style.width = total ? `${Math.round((done/total)*100)}%` : '0%';

    // Update filter chip styles
    $$('.filters .chip').forEach(c=>{
      c.classList.toggle('active', c.dataset.filter===state.filter);
    });
  }

  async function loadQuote(){
    try {
      const res = await fetch('https://api.quotable.io/quotes/random?tags=wisdom');
      if(!res.ok) throw new Error('Request failed');
      const [data] = await res.json();
      apiQuoteEl.textContent = `“${data.content}”`;
      apiAuthorEl.textContent = `— ${data.author}`;
    } catch {
      apiQuoteEl.textContent = 'A calm mind builds better plans.';
      apiAuthorEl.textContent = '— Daily focus tip';
    }
  }

  // Filter & search events
  $$('.filters .chip').forEach(chip=>{
    if(!chip.dataset.filter) return;
    chip.addEventListener('click', ()=>{
      state.filter = chip.dataset.filter;
      render();
    });
  });
  $('#clearCompleted').addEventListener('click', ()=>{
    state.tasks = state.tasks.filter(t=>!t.completed);
    render(); save();
  });
  searchInput.addEventListener('input', ()=>{
    state.search = searchInput.value;
    render();
  });

  // Create handlers
  addBtn.addEventListener('click', addTask);
  taskInput.addEventListener('keydown', (e)=>{
    if(e.key==='Enter') addTask();
  });
  refreshQuoteBtn.addEventListener('click', loadQuote);

  // Export / Import
  $('#exportBtn').addEventListener('click', ()=>{
    const blob = new Blob([JSON.stringify(state.tasks, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `alfido_todo_${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  });
  $('#importFile').addEventListener('change', async (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const text = await file.text();
    try{
      const data = JSON.parse(text);
      if(Array.isArray(data)){
        // Normalize & keep existing if IDs collide
        const ids = new Set(state.tasks.map(t=>t.id));
        const imported = data
          .filter(o => o && typeof o === 'object' && o.text)
          .map(o => ({
            id: ids.has(o.id) ? (o.id + '_' + Math.random().toString(36).slice(2)) : (o.id || uid()),
            text: String(o.text),
            completed: !!o.completed,
            due: o.due || '',
            priority: ['low','med','high'].includes(o.priority)?o.priority:'low',
            createdAt: o.createdAt || Date.now(),
            order: o.order || (state.tasks.length + 1)
          }));
        state.tasks = [...state.tasks, ...imported];
        render(); save();
      } else {
        alert('Invalid JSON format.');
      }
    }catch(err){
      alert('Failed to import JSON.');
    } finally {
      e.target.value='';
    }
  });

  // Init
  load(); render();
  loadQuote();
})();
</script>
</body>
</html>
